name: AI Auto PR from Issue

on:
  issues:
    types: [labeled]

jobs:
  ai-pr:
    if: contains(github.event.issue.labels.*.name, 'ai-task')
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repo
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 20

      - name: Install deps
        run: npm install

      - name: Generate code from AI
        run: node scripts/ai-generate.js
        env:
          ISSUE_TITLE: ${{ github.event.issue.title }}
          ISSUE_BODY: ${{ github.event.issue.body }}
          OPENAI_API_KEY: ${{ secrets.OPENAI_API_KEY }}

      - name: Commit & Push
        run: |
          git config user.name "ai-bot"
          git config user.email "ai@bot.com"
          git checkout -b ai/${{ github.event.issue.number }}
          git add .
          git commit -m "AI: resolve issue #${{ github.event.issue.number }}"
          git push origin ai/${{ github.event.issue.number }}

      - name: Create PR
        uses: peter-evans/create-pull-request@v6
        with:
          title: "AI PR: Fix #${{ github.event.issue.number }}"
          body: "Auto-generated by AI"
          branch: ai/${{ github.event.issue.number }}