name: AI Auto PR from Issue

on:
  issues:
    types: [opened, labeled]

jobs:
  ai-pr:
    if: github.event.action == 'labeled' && contains(github.event.issue.labels.*.name, 'ai-task')
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 20

      - run: npm ci

      - name: Debug Issue
        run: |
          echo "TITLE: ${{ github.event.issue.title }}"
          echo "LABELS: ${{ join(github.event.issue.labels.*.name, ', ') }}"

      - name: Generate code from AI
        run: node scripts/ai-generate.js
        env:
          ISSUE_TITLE: ${{ github.event.issue.title }}
          ISSUE_BODY: ${{ github.event.issue.body }}
          ISSUE_NUMBER: ${{ github.event.issue.number }}
          OPENAI_API_KEY: ${{ secrets.OPENAI_API_KEY }}

      - name: Create PR
        uses: peter-evans/create-pull-request@v6
        with:
          title: "AI PR: Fix #${{ github.event.issue.number }}"
          body: "Auto-generated by AI"
          branch: ai/${{ github.event.issue.number }}
          commit-message: "AI: resolve issue #${{ github.event.issue.number }}"
