name: Bug Report  
description: Report a bug in the project  
title: "[Bug] "  
labels: ["bug", "ai-task"]  

body:
  - type: markdown  
    attributes:
      value: "Thanks! Please fill this clearly so AI can fix it automatically 🤖"

  - type: input  
    id: bug-summary  
    attributes:
      label: "Bug Summary"
      placeholder: "Button checkout tidak bisa diklik"
    validations:
      required: true  

  - type: input
    id: file-path
    attributes:
      label: "File Path (IMPORTANT for AI)"
      placeholder: "components/CheckoutButton.vue"
    validations:
      required: true

  - type: textarea  
    id: steps-to-reproduce  
    attributes:
      label: "Steps to Reproduce"
      placeholder: |
        1. Buka halaman checkout
        2. Klik button
        3. Tidak terjadi apa-apa
    validations:
      required: true  

  - type: textarea  
    id: expected-result  
    attributes:
      label: "Expected Result"
      placeholder: "Button harus submit form"

  - type: textarea
    id: actual-result
    attributes:
      label: "Actual Result"
      placeholder: "Button tidak merespon"

  - type: textarea
    id: error-log
    attributes:
      label: "Error Log (if any)"
      placeholder: "Console error / stack trace"

  - type: dropdown  
    id: browser  
    attributes:
      label: "Browser"
      options:
        - Chrome  
        - Firefox  
        - Safari  
        - Edge  
        - Other